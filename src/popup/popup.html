<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <h1>Commute Filter</h1>
    <p class="subtitle">Show only listings within reach of work</p>
  </header>

  <main>
    <label for="address">Work address</label>
    <input
      type="text"
      id="address"
      placeholder="e.g. 350 5th Ave, New York, NY"
      autocomplete="off"
    />

    <label for="minutes">Max commute (minutes)</label>
    <input type="number" id="minutes" min="1" max="60" value="30" />
    <p class="hint">1&ndash;60 minutes</p>

    <label for="mode">Travel mode</label>
    <select id="mode">
      <option value="transit" selected>Public transit</option>
      <option value="walk">Walking</option>
      <option value="bicycle">Biking</option>
      <option value="drive">Driving</option>
    </select>

    <div class="buttons">
      <button id="apply" class="primary">Apply filter</button>
      <button id="clear">Clear</button>
    </div>

    <p id="status" role="status"></p>
  </main>

  <script src="popup.js"></script>
</body>
</html>
